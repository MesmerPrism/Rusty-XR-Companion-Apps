name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.201

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore
        run: dotnet restore RustyXr.Companion.slnx

      - name: Build
        run: dotnet build RustyXr.Companion.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RustyXr.Companion.slnx --configuration Release --no-build

      - name: Build docs site
        run: npm run pages:build

      - name: Public boundary scan
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tools\app\Invoke-PublicBoundaryScan.ps1
