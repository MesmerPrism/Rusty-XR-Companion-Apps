name: Release Windows Companion

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      SETUP_FILE_NAME: RustyXrCompanion-Setup.exe
      APP_ZIP_FILE_NAME: RustyXrCompanion-win-x64.zip
      CLI_ZIP_FILE_NAME: rusty-xr-companion-cli-win-x64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.201

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tagName = 'v${{ inputs.version }}'
            $semVer = '${{ inputs.version }}'
          }
          else {
            $tagName = '${{ github.ref_name }}'
            if ($tagName -match '^v(?<SemVer>\d+\.\d+\.\d+)$') {
              $semVer = $Matches.SemVer
            }
            else {
              throw "Expected a tag like v0.1.0, got $tagName"
            }
          }

          if ($semVer -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must look like 0.1.0, got $semVer"
          }

          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_version=$semVer.0" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore RustyXr.Companion.slnx

      - name: Build
        run: dotnet build RustyXr.Companion.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RustyXr.Companion.slnx --configuration Release --no-build

      - name: Build docs site
        run: npm run pages:build

      - name: Publish app
        run: >
          dotnet publish src/RustyXr.Companion.App/RustyXr.Companion.App.csproj
          --configuration Release
          --runtime win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output artifacts/app-win-x64

      - name: Publish CLI
        run: >
          dotnet publish src/RustyXr.Companion.Cli/RustyXr.Companion.Cli.csproj
          --configuration Release
          --runtime win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output artifacts/cli-win-x64

      - name: Decode setup signing certificate
        id: setup_certificate
        shell: pwsh
        env:
          WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64)) {
            "path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP 'RustyXrCompanion-setup-signing.pfx'
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64))
          "path=$certificatePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish setup helper
        shell: pwsh
        env:
          WINDOWS_PREVIEW_SETUP_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_PASSWORD }}
          WINDOWS_PREVIEW_SETUP_TIMESTAMP_URL: ${{ vars.WINDOWS_PREVIEW_SETUP_TIMESTAMP_URL }}
        run: |
          $args = @(
            '-Version', '${{ steps.version.outputs.package_version }}',
            '-FileName', $env:SETUP_FILE_NAME
          )

          $certificatePath = '${{ steps.setup_certificate.outputs.path }}'
          if (-not [string]::IsNullOrWhiteSpace($certificatePath)) {
            $args += @(
              '-CertificatePath', $certificatePath,
              '-CertificatePassword', $env:WINDOWS_PREVIEW_SETUP_CERTIFICATE_PASSWORD
            )

            if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_PREVIEW_SETUP_TIMESTAMP_URL)) {
              $args += @('-TimestampUrl', $env:WINDOWS_PREVIEW_SETUP_TIMESTAMP_URL)
            }
          }

          & powershell -ExecutionPolicy Bypass -File .\tools\app\Publish-PreviewSetup.ps1 @args

      - name: Validate signed helper when certificate configured
        if: ${{ steps.setup_certificate.outputs.path != '' }}
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File .\tools\app\Test-ReleaseAssetSigning.ps1
          -SetupPath artifacts\windows-installer\${{ env.SETUP_FILE_NAME }}
          -RequireSignature
          -AllowSelfSigned

      - name: Package release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\windows-installer | Out-Null
          Compress-Archive -Path artifacts\app-win-x64\* -DestinationPath "artifacts\windows-installer\$env:APP_ZIP_FILE_NAME"
          Compress-Archive -Path artifacts\cli-win-x64\* -DestinationPath "artifacts\windows-installer\$env:CLI_ZIP_FILE_NAME"

      - name: Write SHA256 sums
        shell: pwsh
        run: |
          $files = @(
            "artifacts\windows-installer\$env:SETUP_FILE_NAME",
            "artifacts\windows-installer\$env:APP_ZIP_FILE_NAME",
            "artifacts\windows-installer\$env:CLI_ZIP_FILE_NAME"
          )

          Get-FileHash -Path $files -Algorithm SHA256 |
            ForEach-Object { '{0} *{1}' -f $_.Hash.ToLowerInvariant(), [IO.Path]::GetFileName($_.Path) } |
            Set-Content -Path artifacts\windows-installer\SHA256SUMS.txt -Encoding utf8

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RustyXrCompanion-windows-release
          path: artifacts/windows-installer

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = '${{ steps.version.outputs.tag_name }}'
          $releaseTitle = "Rusty XR Companion ${{ steps.version.outputs.package_version }}"
          $assets = @(
            "artifacts\windows-installer\$env:SETUP_FILE_NAME",
            "artifacts\windows-installer\$env:APP_ZIP_FILE_NAME",
            "artifacts\windows-installer\$env:CLI_ZIP_FILE_NAME",
            'artifacts\windows-installer\SHA256SUMS.txt'
          )

          gh release view $tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tagName $assets --clobber
          }
          else {
            gh release create $tagName $assets --title $releaseTitle --generate-notes --latest --target $env:GITHUB_SHA
          }

      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: |
          $certificatePath = '${{ steps.setup_certificate.outputs.path }}'
          if (-not [string]::IsNullOrWhiteSpace($certificatePath) -and (Test-Path $certificatePath)) {
            Remove-Item -Force $certificatePath
          }
